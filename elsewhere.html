<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sidhu Achary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 16px;
        }

        nav .active {
            border-bottom: 2px solid #000;
            font-weight: bold;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Headings */
        h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }

        h3 {
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* Links */
        a {
            color: #000;
            text-decoration: underline;
        }

        a:hover {
            opacity: 0.6;
        }

        /* Contact Section */
        .contact {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .contact ul {
            list-style: none;
        }

        .contact li {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .contact-section{
            display: flex;
            justify-content: space-between;
        }

        /* Image */
        .contact img {
            width: 180px;
            border-radius: 8px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }

            h1 {
                font-size: 36px;
            }

            .contact {
                flex-direction: column;
                gap: 20px;
            }

            .contact img {
                width: 140px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Navigation -->
        <nav>

            <a href="about.html">about</a>
            <a href="projects.html">projects</a>
            <a href="now.html">now</a>
            <a href="elsewhere.html" class="active">elsewhere</a>
        </nav>

        <div class="contact-section">

                <h3>Contacts</h3>

                    <li>
                        <a href="https://linkedin.com/in/sidhu2" target="_blank">LinkedIn</a>
                    </li>

                    </li>
                    <li>
                        Medium: <a href="https://medium.com/@siddhuachary2005" target="_blank">@sidhuachary2005</a>
                    </li>
                    <li>
                        <a href="https://www.reddit.com/user/NoMagazine5520/" target="_blank">Reddit</a>
                    </li>
                    <li>
                        I reply to every <a href="mailto:siddhuachary2005@gmail.com" >Email</a>
                    </li>
                </ul>
            </div>

            <div class="contact-right">
                <img src="assets/contact.gif" width="340" alt="profile" />
            </div>
        </div>
    </div>
</body>

</html>

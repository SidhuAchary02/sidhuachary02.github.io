<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What i am doing now | Sidhu Achary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Navigation */
        nav {
            display: flex;
            gap: 20px;
            justify-content: flex-start;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 16px;
            font-family: Georgia, serif;
            position: relative;
            transition: opacity 0.2s ease;
        }

        nav .active {
            border-bottom: 2px solid #000;
            font-weight: bold;
        }

        nav a:hover {
            opacity: 0.6;
        }

        /* Main Content */
        h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: Georgia, serif;
        }

        h3 {
            font-size: 28px;
            font-weight: bold;
            margin-top: 30px;
            margin-bottom: 15px;
            font-family: Georgia, serif;
        }

        h4 {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            font-family: Georgia, serif;
        }

        p {
            font-size: 16px;
            margin-bottom: 25px;
            color: #555;
        }

        /* Links */
        a {
            color: #000;
            text-decoration: none;
            cursor: pointer;
        }

        a:hover {
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px 60px;
            margin-top: 30px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .item:hover {
            background-color: #f5f5f5;
            transform: translateX(4px);
        }

        .item img {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            object-fit: contain;
        }

        .medium-icon {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00ab6b, #00d084);
            color: white;
            font-weight: bold;
            font-size: 28px;
            border-radius: 4px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name {
            font-size: 14px;
            color: #666;
            font-weight: 400;
            line-height: 1.3;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .platform {
            font-size: 20px;
            color: #000;
            font-weight: 600;
            line-height: 1.3;
            font-family: Georgia, serif;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px 40px;
            }

            h3 {
                font-size: 24px;
            }

            .item {
                gap: 14px;
                padding: 10px;
            }

            .item img,
            .medium-icon {
                width: 48px;
                height: 48px;
            }

            .platform {
                font-size: 18px;
            }

            .name {
                font-size: 13px;
            }
        }

        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 18px 0;
            }

            h1 {
                font-size: 36px;
            }

            h3 {
                font-size: 22px;
            }

            nav {
                gap: 15px;
                font-size: 14px;
            }

            body {
                padding: 20px 15px;
            }

            .item {
                gap: 16px;
                padding: 10px;
            }

            .item img,
            .medium-icon {
                width: 48px;
                height: 48px;
            }

            .platform {
                font-size: 18px;
            }
        }
    </style>
</head>
